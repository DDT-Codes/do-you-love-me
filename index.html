<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <div class="container">
        <div class="sparkles"></div>

        <img src="assets/bear.png" class="bear" id="bear" alt="Cute Bear">

        <h1 id="title"></h1>

        <p class="subtitle">
            Be honest... I promise I won't cry. 🥺
        </p>

        <div class="buttons">
            <button id="yes">Yes ❤️</button>
            <button id="no">No 🙈</button>
        </div>

    </div>



<div id="celebration">
    
    <h1>🎉 Yay!! 🎉</h1>
    
    <p>You made my day! ❤️</p>
    
    <div class="big-heart">💖</div>
    
    <h2>I love you more than words can say. 🥰</h2>
    
</div>
<canvas id="confetti"></canvas>
<div id="heart-container"></div>
<script src="script.js"></script>
<audio id="bgMusic" loop>
    <source src="audio/love.mp3" type="audio/mpeg">
</audio>
</body>
</html>
